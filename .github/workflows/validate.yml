name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Compile sources
        run: python -m py_compile main_runner.py src/*.py src/analysis/*.py
      - name: Import smoke test
        run: python -c "import main_runner; import src.analysis.composition; import src.analysis.fake_tracks; import src.analysis.root_loader; print('smoke ok')"
